name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS universal targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run check:version
      - run: npm test
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: npm run tauri -- build --target universal-apple-darwin
      - name: Archive bundle
        # The bundle is named after productName, so hardcoding it here breaks the release the
        # first time the product is renamed — and only after the tag is already pushed.
        run: |
          app="src-tauri/target/universal-apple-darwin/release/bundle/macos/$(jq -r .productName src-tauri/tauri.conf.json).app"
          test -d "$app" || { echo "bundle not found: $app"; ls -1 src-tauri/target/universal-apple-darwin/release/bundle/macos/; exit 1; }
          # Ad-hoc sign every slice. The universal lipo only carries the linker's arm64 ad-hoc
          # signature, leaving the x86_64 slice unsigned — macOS then records the unsigned
          # slice's candidate hashes when the user grants Accessibility, while the arm64 slice
          # actually runs, so the grant never matches the process and silently does nothing.
          codesign --force --deep --sign - "$app"
          codesign --verify --verbose --arch x86_64 "$app"
          codesign --verify --verbose --arch arm64 "$app"
          ditto -c -k --sequesterRsrc --keepParent "$app" cc-macos-universal-unsigned.zip
      - uses: actions/upload-artifact@v4
        with:
          name: cc-macos-universal-unsigned
          path: cc-macos-universal-unsigned.zip
          if-no-files-found: error
          retention-days: 90
      - uses: softprops/action-gh-release@v2
        with:
          files: cc-macos-universal-unsigned.zip
          draft: true
          generate_release_notes: true
