name: CI

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:version
      - run: npm test
      - run: npm run build
      - run: npm audit --audit-level=high

  desktop:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS universal targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # Same commands docs/RELEASE.md lists as the pre-release check, so the machine enforces the
      # guide rather than the guide relying on someone remembering it.
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: npm run tauri -- build --target universal-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: cc-macos-universal-unsigned
          path: src-tauri/target/universal-apple-darwin/release/bundle/**
          if-no-files-found: error
          retention-days: 14
