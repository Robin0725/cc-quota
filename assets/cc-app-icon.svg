<!--
  CC app icon master, 1024pt. Two interlocking C's: blue for Codex, orange for Claude.

  The previous version used the same two letters but with thin strokes set close together, which
  merged into an unreadable smear at 16px — the size Finder lists, Cmd-Tab and Spotlight actually
  render. The fix is weight and separation, not a new idea: the stroke is now ~62% of the letter
  radius, and the orange C is lifted off the blue one by a dark relief stroke so the overlap reads
  as depth rather than as a muddy join.

  Deliberately flat: no fine outlines, no multi-layer gradients, no small ornament. Those survive
  only at 512pt and turn into noise everywhere else.

  Colours track the tray palette in src-tauri/src/lib.rs closely enough to read as the same
  product, brightened a little to hold up against the near-black shell.

  The shell keeps a 52pt inset. Filling the full canvas would make CC sit visibly larger than its
  neighbours in the Dock.

  Regenerate the PNG set after editing (render this file to a 1024x1024 PNG first):
    npm run tauri -- icon <that PNG>
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="116" y1="74" x2="904" y2="946" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12141A"/><stop offset=".5" stop-color="#0A0B0F"/><stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="rake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity=".10"/>
      <stop offset=".24" stop-color="#fff" stop-opacity=".015"/>
      <stop offset=".46" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#5C9BFF"/><stop offset="1" stop-color="#2563E0"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#E08A5F"/><stop offset="1" stop-color="#B0512F"/>
    </linearGradient>
  </defs>

  <rect x="52" y="52" width="920" height="920" rx="228" fill="url(#bg)"/>
  <rect x="52" y="52" width="920" height="920" rx="228" fill="url(#rake)"/>

  <!-- Codex -->
  <path d="M 508.0 369.5 A 168 168 0 1 0 508.0 654.5" fill="none" stroke="url(#blue)" stroke-width="104" stroke-linecap="round"/>
  <!-- Relief: cuts a shadow gap so the orange C sits in front instead of blending. -->
  <path d="M 773.0 369.5 A 168 168 0 1 0 773.0 654.5" fill="none" stroke="#07080B" stroke-width="138" stroke-linecap="round"/>
  <!-- Claude -->
  <path d="M 773.0 369.5 A 168 168 0 1 0 773.0 654.5" fill="none" stroke="url(#orange)" stroke-width="104" stroke-linecap="round"/>

  <rect x="53.5" y="53.5" width="917" height="917" rx="226.5" fill="none" stroke="#fff" stroke-opacity=".10" stroke-width="3"/>
</svg>
